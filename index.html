<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Free Fire PRO</title>

<style>

/* FONDO GAMER */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  background: url('https://wallpapers.com/images/featured/free-fire-neon-4k-7h0r9j7l8n9k0x1y.jpg') no-repeat center center fixed;
  background-size: cover;
  overflow-x: hidden;
}

/* OSCURECER */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
  z-index: -1;
}

/* LOGIN */
#login {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.login-box {
  background: rgba(15,23,42,0.9);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 20px #9333ea;
}

.login-box input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 10px 0;
  width: 200px;
}

.login-box button {
  background: #9333ea;
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* PARTICULAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
header {
  text-align: center;
  padding: 40px;
}

h1 {
  font-size: 40px;
  text-shadow: 0 0 10px #9333ea, 0 0 30px #9333ea;
}

/* CONTENEDOR */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* TARJETAS */
.card {
  background: rgba(15,23,42,0.85);
  margin: 20px 0;
  padding: 15px;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid rgba(147,51,234,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #9333ea;
}

/* PRECIO */
.price {
  color: #22c55e;
  font-weight: bold;
}

/* BOTÓN */
button {
  background: #9333ea;
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

/* RIPPLE */
button span {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple 0.6s linear;
  background: rgba(255,255,255,0.6);
}

@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

button:hover {
  background: #7e22ce;
}

/* SECCIONES */
h2 {
  border-left: 5px solid #9333ea;
  padding-left: 10px;
}

/* TELEGRAM */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #229ED9;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  color: white;
  box-shadow: 0 0 15px #229ED9;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>🎮 Iniciar sesión por ID</h2>
    <input type="text" id="userId" placeholder="Ingresa tu ID">
    <br>
    <button onclick="validarID()">Entrar</button>
    <p id="error" style="color:red; display:none;">❌ Error: ID no encontrado</p>
  </div>
</div>

<canvas id="particles"></canvas>

<header>
  <h1>🔥 TIENDA FREE FIRE 🔥</h1>
  <p id="mostrarID" style="color:#22c55e; font-weight:bold;"></p>
  <p>Diamantes y Pase Booyah - Entrega Rápida ⚡</p>
</header>

<div class="container">

<p style="color:#facc15;">🔥 Oferta limitada</p>

<h2>💎 Diamantes</h2>

<div class="card">
  <span>1060 diamantes</span>
  <span class="price">$5000</span>
  <button onclick="comprar(event, 'https://mpago.la/2aCmCG8')">Comprar</button>
</div>

<div class="card">
  <span>2180 diamantes</span>
  <span class="price">$10000</span>
  <button onclick="comprar(event, 'https://mpago.la/1EvBC1f')">Comprar</button>
</div>

<div class="card">
  <span>5600 diamantes</span>
  <span class="price">$15000</span>
  <button onclick="comprar(event, 'https://mpago.la/22fweLo')">Comprar</button>
</div>

<h2>🎟️ Pase Booyah</h2>

<div class="card">
  <span>Pase Booyah</span>
  <span class="price">$1500</span>
  <button onclick="comprar(event, 'https://mpago.la/2yEerku')">Comprar</button>
</div>

</div>

<!-- TELEGRAM -->
<a class="whatsapp" id="telegramBtn" href="#" target="_blank">
📩
</a>

<footer>
  © 2026 Tienda Free Fire PRO
</footer>

<script>

/* LOGIN */
function validarID(){
  let id = document.getElementById("userId").value;
  let error = document.getElementById("error");

  let regex = /^[0-9]{8,12}$/;

  if(regex.test(id)){
    localStorage.setItem("usuarioID", id);
    document.getElementById("login").style.display = "none";
    mostrarUsuario();
  } else {
    error.style.display = "block";
  }
}

/* MOSTRAR ID */
function mostrarUsuario(){
  let id = localStorage.getItem("usuarioID");
  if(id){
    document.getElementById("mostrarID").innerText = "👤 Jugador: " + id;
  }
}

/* TELEGRAM AUTOMÁTICO */
document.getElementById("telegramBtn").addEventListener("click", function(){
  let id = localStorage.getItem("usuarioID") || "No especificado";
  let mensaje = "Hola, quiero comprar en la tienda Free Fire 🎮%0AID: " + id;
  let url = "https://t.me/Vaneegzz?text=" + mensaje;
  window.open(url, "_blank");
});

/* COMPRA */
function comprar(e, link){
  let audio = new Audio("https://www.myinstants.com/media/sounds/click.mp3");
  audio.play();

  let circle = document.createElement("span");
  let rect = e.target.getBoundingClientRect();
  circle.style.left = e.clientX - rect.left + "px";
  circle.style.top = e.clientY - rect.top + "px";
  e.target.appendChild(circle);

  setTimeout(()=> circle.remove(), 600);

  setTimeout(() => {
    window.open(link, "_blank");
  }, 300);
}

/* PARTICULAS */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#9333ea";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height) p.y = 0;
  });
}

setInterval(draw,30);

window.onload = function(){
  mostrarUsuario();
}

</script>

</body>
</html>
