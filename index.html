<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Free Fire PRO</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Segoe UI',sans-serif;
  color:white;
  min-height:100vh;
  background-image:url('Free23.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  z-index:-1;
}

header{
  text-align:center;
  padding:20px;
}

#userId{
  padding:12px;
  border-radius:10px;
  border:none;
  text-align:center;
  width:80%;
  max-width:300px;
  margin-top:10px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:20px 0;
}

.product-img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:15px;
}

.price{
  color:#22c55e;
  font-weight:bold;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#9333ea,#22c55e,#facc15);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.telegram{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0088cc;
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h1>🔥 TIENDA FREE FIRE PRO 🔥</h1>
  <input type="text" id="userId" placeholder="Ingresa tu ID Free Fire">
</header>

<div class="container">

<h2>💎 Diamantes</h2>

<div class="card">
  <img src="freefire.jpeg" class="product-img">
  <div>
    <h3>1060 Diamantes</h3>
    <p class="price">$5,000</p>
  </div>
  <button onclick="comprar('https://mpago.la/2aCmCG8','1060 Diamantes')">Comprar</button>
</div>

<div class="card">
  <img src="freefire.jpeg" class="product-img">
  <div>
    <h3>2180 Diamantes</h3>
    <p class="price">$10,000</p>
  </div>
  <button onclick="comprar('https://mpago.la/1EvBC1f','2180 Diamantes')">Comprar</button>
</div>

<div class="card">
  <img src="freefire.jpeg" class="product-img">
  <div>
    <h3>5600 Diamantes</h3>
    <p class="price">$15,000</p>
  </div>
  <button onclick="comprar('https://mpago.la/22fweLo','5600 Diamantes')">Comprar</button>
</div>

<h2>🎟️ Pase Elite</h2>

<div class="card">
  <img src="freefire.jpeg" class="product-img">
  <div>
    <h3>Pase Booyah</h3>
    <p class="price">$1,500</p>
  </div>
  <button onclick="comprar('https://mpago.la/2yEerku','Pase Booyah')">Comprar</button>
</div>

</div>

<a class="telegram" href="https://t.me/Vaneegzz" target="_blank">✈️</a>

<script>

function obtenerID(){
  const id=document.getElementById('userId').value.trim();
  const regex=/^[0-9]{6,}$/;

  if(!regex.test(id)){
    alert("Ingresa un ID válido (mínimo 6 números)");
    return null;
  }

  return id;
}

function comprar(url,producto){

  const id=obtenerID();
  if(!id) return;

  const mensaje=`🔥 NUEVA COMPRA

👤 ID: ${id}
🛒 Producto: ${producto}`;

  const telegram=`https://t.me/Vaneegzz?text=${encodeURIComponent(mensaje)}`;

  window.open(url,'_blank');

  setTimeout(()=>{
    window.open(telegram,'_blank');
  },800);
}

</script>

</body>
</html>
